                  $ref: "#/components/schemas/QuickNote"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── Subject ──
    Subject:
      type: object
      required: [id, name, color, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        color:
          type: string
        createdAt:
          type: string
          format: date-time

    SubjectInput:
      type: object
      required: [name, color]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        color:
          type: string

    SubjectUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        color:
          type: string

    # ── Topic ──
    Topic:
      type: object
      required: [id, subjectId, name, createdAt]
      properties:
        id:
          type: integer
        subjectId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    TopicInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string

    TopicUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]

    # ── Note ──
    Note:
      type: object
      required: [id, topicId, title, createdAt]
      properties:
        id:
          type: integer
        topicId:
          type: integer
        title:
          type: string
        content:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    NoteInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        content:
          type: string

    NoteUpdate:
      type: object
      properties:
        title:
          type: string
        content:
          type: ["string", "null"]

    # ── Formula ──
    Formula:
      type: object
      required: [id, topicId, title, isImportant, createdAt]
      properties:
        id:
          type: integer
        topicId:
          type: integer
        title:
          type: string
        content:
